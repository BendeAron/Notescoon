services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: notescoon
      POSTGRES_PASSWORD: notescoon
      POSTGRES_DB: notescoon
    ports:
      - "5432:5432"
    volumes:
      - notescoon_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notescoon -d notescoon"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  notescoon_db_data:
